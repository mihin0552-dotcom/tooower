<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cell Tower AR Viewer - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        #bottom-sheet { transform: translateY(100%); transition: transform 0.35s ease; z-index: 1000; }
        #bottom-sheet.visible { transform: translateY(0); }
        #ar-scene-container { position: fixed; inset: 0; z-index: 0; background: #000; }
        #hud-overlay { pointer-events: none; }
        #hud-overlay div { pointer-events: auto; }
        .toast-show { animation: slide-up-fade 2.2s ease forwards; }
        @keyframes slide-up-fade { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden bg-black font-sans antialiased">

    <div id="camera-prompt" class="fixed inset-0 z-[9000] flex flex-col items-center justify-center bg-slate-950 text-white text-center px-6">
        <div class="max-w-md bg-slate-900 rounded-2xl p-8 shadow-2xl border border-indigo-500/40">
            <h1 class="text-xl font-bold mb-3 text-indigo-400">Camera Access Required</h1>
            <p class="text-sm text-slate-300 mb-6">Click the button below to enable the camera for AR visualization.</p>
            <button onclick="startApp()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-indigo-600/30">
                Enable Camera
            </button>
        </div>
    </div>

    <div id="ar-scene-container">
        <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false" 
                 arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
                 loading-screen="dotsColor: #818cf8; backgroundColor: #0f172a;">
            <a-camera id="gps-camera" gps-camera rotation-reader></a-camera>
        </a-scene>
    </div>

    <div id="hud-overlay" class="fixed top-0 left-0 right-0 z-[100] p-3 flex flex-col gap-2 text-white">
        <div class="bg-slate-900/75 backdrop-blur-xl rounded-2xl px-4 py-3 border border-white/10 w-fit">
            <div class="text-xs space-y-1">
                <div>Lat: <span id="hud-lat" class="font-mono">--</span></div>
                <div>Lng: <span id="hud-lng" class="font-mono">--</span></div>
                <div class="text-indigo-300 pt-1">Towers: <span id="hud-tower-count">0</span></div>
            </div>
        </div>
    </div>

    <button id="toggle-fab" class="fixed z-[200] bottom-6 right-4 w-14 h-14 rounded-full bg-indigo-600 text-white shadow-2xl flex items-center justify-center text-2xl border-2 border-indigo-300/40 cursor-pointer">＋</button>

    <div id="bottom-sheet" class="fixed bottom-0 left-0 right-0 bg-slate-900 p-6 rounded-t-[28px] border border-white/10 text-white overflow-y-auto max-h-[80vh]">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">📡 Add New Tower</h2>
            <button onclick="hideSheet()" class="text-slate-400 text-xl">✕</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="tower-name" placeholder="Tower Name" class="w-full bg-slate-800 p-3 rounded-xl border border-white/10 outline-none">
            <select id="tower-provider" class="w-full bg-slate-800 p-3 rounded-xl border border-white/10 outline-none">
                <option>Dialog</option><option>Mobitel</option><option>Hutch</option>
            </select>
            <input type="number" id="tower-lat" placeholder="Latitude (6.9xxx)" class="w-full bg-slate-800 p-3 rounded-xl border border-white/10 outline-none">
            <input type="number" id="tower-lng" placeholder="Longitude (79.8xxx)" class="w-full bg-slate-800 p-3 rounded-xl border border-white/10 outline-none">
            <button onclick="handleAddTower()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">Add Tower to AR</button>
        </div>
    </div>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <script>
        let towers = JSON.parse(localStorage.getItem('saved_towers')) || [];
        const arScene = document.querySelector('a-scene');

        // 1. බලෙන්ම කැමරාව ඉල්ලන ශ්‍රිතය
        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                stream.getTracks().forEach(track => track.stop()); // Permission ලැබුණු පසු නවත්වන්න
                document.getElementById('camera-prompt').style.display = 'none';
                
                // ඇත්තටම කැමරාව පාවිච්චි කරන්න Scene එක Refresh කරන්න
                location.reload(); 
            } catch (err) {
                alert("Camera permission denied. Please enable it in browser settings.");
            }
        }

        // පර්මිෂන් චෙක් කිරීම
        navigator.permissions.query({name: 'camera'}).then(res => {
            if (res.state === 'granted') {
                document.getElementById('camera-prompt').style.display = 'none';
            }
        });

        // GPS දත්ත ලබාගැනීම
        navigator.geolocation.watchPosition(pos => {
            document.getElementById('hud-lat').innerText = pos.coords.latitude.toFixed(5);
            document.getElementById('hud-lng').innerText = pos.coords.longitude.toFixed(5);
        }, err => console.error(err), { enableHighAccuracy: true });

        function showSheet() { document.getElementById('bottom-sheet').classList.add('visible'); }
        function hideSheet() { document.getElementById('bottom-sheet').classList.remove('visible'); }
        document.getElementById('toggle-fab').onclick = showSheet;

        function handleAddTower() {
            const name = document.getElementById('tower-name').value;
            const lat = parseFloat(document.getElementById('tower-lat').value);
            const lng = parseFloat(document.getElementById('tower-lng').value);
            const provider = document.getElementById('tower-provider').value;

            if (name && lat && lng) {
                const newTower = { name, lat, lng, provider };
                towers.push(newTower);
                localStorage.setItem('saved_towers', JSON.stringify(towers));
                createTowerEntity(newTower);
                hideSheet();
                updateCount();
            }
        }

        function createTowerEntity(t) {
            const el = document.createElement('a-entity');
            el.setAttribute('gps-entity-place', `latitude: ${t.lat}; longitude: ${t.lng};`);
            
            const sphere = document.createElement('a-sphere');
            sphere.setAttribute('radius', '2');
            sphere.setAttribute('color', t.provider === 'Dialog' ? '#00BCD4' : '#2196F3');
            
            const text = document.createElement('a-text');
            text.setAttribute('value', `${t.name}\n${t.provider}`);
            text.setAttribute('look-at', '[gps-camera]');
            text.setAttribute('scale', '30 30 30');
            text.setAttribute('position', '0 5 0');
            text.setAttribute('align', 'center');

            el.appendChild(sphere);
            el.appendChild(text);
            arScene.appendChild(el);
        }

        function updateCount() { document.getElementById('hud-tower-count').innerText = towers.length; }

        arScene.addEventListener('loaded', () => {
            towers.forEach(createTowerEntity);
            updateCount();
        });
    </script>
</body>
</html>
